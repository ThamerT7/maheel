<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B4332" />
    <title>غير متصل — مَهِيل</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Noto Sans Arabic', 'Noto Kufi Arabic', sans-serif;
        background-color: #faf7f2;
        color: #1b4332;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      .container {
        max-width: 400px;
      }

      .logo {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.02em;
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        opacity: 0.6;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #1b4332;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.7;
        color: #52796f;
        margin-bottom: 2rem;
      }

      .retry-btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background-color: #1b4332;
        color: #faf7f2;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .retry-btn:hover {
        opacity: 0.85;
      }

      .retry-btn:active {
        opacity: 0.7;
      }

      .verse {
        margin-top: 3rem;
        font-size: 0.95rem;
        color: #8aad9e;
        line-height: 1.8;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">مَهِيل</div>
      <div class="icon">☁️</div>
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>يبدو أنك غير متصل حاليًا. تحقق من اتصالك بالإنترنت وحاول مرة أخرى.</p>
      <button class="retry-btn" onclick="window.location.reload()">
        إعادة المحاولة
      </button>
      <div class="verse">
        ﴿ فَإِنَّ مَعَ الْعُسْرِ يُسْرًا ﴾
      </div>
    </div>
  </body>
</html>
